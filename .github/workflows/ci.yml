name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install cython numpy
          pip install -e ".[dev]" --no-build-isolation

      - name: Lint with ruff
        run: ruff check fa2/ tests/

      - name: Run tests with coverage
        run: pytest tests/ --cov=fa2 --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  test-pure-python:
    runs-on: ubuntu-latest
    name: "Test pure Python (no Cython)"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install without Cython
        run: |
          python -m pip install --upgrade pip setuptools
          pip install numpy scipy tqdm networkx igraph pytest pytest-cov pytest-benchmark
          pip install -e . --no-build-isolation

      - name: Run tests
        run: pytest tests/test_fa2util.py tests/test_forceatlas2.py -v

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build cython numpy setuptools

      - name: Build sdist and wheel
        run: python -m build

      - name: Check dist
        run: |
          pip install twine
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
