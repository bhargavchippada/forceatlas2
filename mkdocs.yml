site_name: ForceAtlas2 for Python
site_url: https://bhargavchippada.github.io/forceatlas2/
site_description: The fastest Python implementation of the ForceAtlas2 graph layout algorithm
repo_url: https://github.com/bhargavchippada/forceatlas2
repo_name: bhargavchippada/forceatlas2

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            merge_init_into_class: true
            separate_signature: true
            signature_crossrefs: true
            show_signature_annotations: true
            filters: ["!^_"]

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Algorithm: algorithm.md
  - Advanced Usage: advanced.md
  - API Reference:
      - ForceAtlas2: api/forceatlas2.md
      - Simple API: api/easy.md
      - Visualization: api/viz.md
      - Metrics: api/metrics.md
      - Force Functions: api/fa2util.md
      - Vectorized Backend: api/vectorized.md
      - CLI: api/cli.md
      - MCP Server: api/mcp.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
